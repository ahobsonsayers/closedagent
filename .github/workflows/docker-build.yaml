name: Build and Push Docker Image (Reusable)

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name (e.g., arranhs/closedagent)
        type: string
        required: true
      context_path:
        description: Build context path (e.g., . or opencode)
        type: string
        default: .
      tags:
        description: Newline-separated list of tags (e.g., "latest\n2025.03.13")
        type: string
        required: true

env:
  DOCKER_IMAGE: ${{ inputs.image_name }}

jobs:
  build:
    name: Build Image
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            platform-slug: linux-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform-slug: linux-arm64

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context_path }}
          platforms: ${{ matrix.platform }}
          tags: ${{ env.DOCKER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Output digest
        uses: GoCodeAlone/github-action-matrix-outputs-write@1.0.3
        with:
          matrix-step-name: build
          matrix-key: ${{ matrix.platform-slug }}
          outputs: |
            digest: ${{ steps.build.outputs.digest }}

  push-tags:
    name: Push Tags
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get digests
        id: get-digests
        uses: GoCodeAlone/github-action-matrix-outputs-read@1.0.6
        with:
          matrix-step-name: build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push tags
        run: |
          # Parse newline-separated tags into array
          TAGS_ARRAY=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS_ARRAY+=("-t ${DOCKER_IMAGE}:${tag}")
          done <<< "${TAGS_INPUT}"

          DIGESTS=$(
            echo "$DIGESTS_JSON" |
            jq -r --arg docker_image "$DOCKER_IMAGE" \
              '.digest | to_entries[] | "\($docker_image)@\(.value)"'
          )

          docker buildx imagetools create \
            "${TAGS_ARRAY[@]}" \
            $DIGESTS
        env:
          DIGESTS_JSON: ${{ steps.get-digests.outputs.result }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          TAGS_INPUT: ${{ inputs.tags }}
