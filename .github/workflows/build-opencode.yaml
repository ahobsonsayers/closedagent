name: Build & push opencode image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-opencode.yaml
      - .github/workflows/update-opencode.yaml
      - images/opencode/**
  schedule:
    - cron: 0 2 * * * # Everyday at 2am
  workflow_dispatch:

jobs:
  get-tags:
    name: Get tags
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tags: ${{ steps.get-tags.outputs.tags }}

    steps:
      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@v6

      - name: Get tags
        id: get-tags
        run: |
          OPENCODE_VERSION=$(
            grep "^ARG OPENCODE_VERSION=" images/opencode/Dockerfile | 
            cut -d '=' -f2
          )

          {
            echo "tags<<EOF"
            echo "latest"
            echo "$OPENCODE_VERSION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  
          echo "
          Output:
          tags: latest, $OPENCODE_VERSION
          "

  build:
    name: Build image
    uses: ahobsonsayers/github-workflows/.github/workflows/docker-build-push.yaml@main
    needs: get-tags
    secrets: inherit
    with:
      working-directory: images/opencode
      image-name: arranhs/opencode
      image-tags: ${{ needs.get-tags.outputs.tags }}
      build-cache: false
