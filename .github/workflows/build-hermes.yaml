name: Build and push hermes image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-hermes.yaml
      - .github/workflows/update-hermes.yaml
      - .github/workflows/build.yaml
      - images/hermes/**
  schedule:
    - cron: 0 2 * * * # Everyday at 2am
  workflow_dispatch:
    inputs:
      no-cache:
        description: No Cache
        type: boolean
        default: false

jobs:
  get-tags:
    name: Get tags
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tags: ${{ steps.get-tags.outputs.tags }}

    steps:
      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@v6

      - name: Get tags
        id: get-tags
        run: |
          HERMES_VERSION=$(
            grep "^ARG HERMES_VERSION=" images/hermes/Dockerfile | 
            cut -d '=' -f2
          )

          {
            echo "tags<<EOF"
            echo "latest"
            echo "$HERMES_VERSION"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  
          echo "
          Output:
          tags: latest, $HERMES_VERSION
          "

  build:
    name: Build image
    needs: get-tags
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    with:
      image-name: arranhs/hermes
      context-path: images/hermes
      image-tags: ${{ needs.get-tags.outputs.tags }}
