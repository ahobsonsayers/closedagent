name: Update pi version

on:
  schedule:
    - cron: 0 1 * * * # Everyday at 1am
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Update version
    uses: ahobsonsayers/github-workflows/.github/workflows/docker-update-app-version.yaml@main
    with:
      app-name: Pi
      dockerfile: images/pi/Dockerfile
      version-arg: PI_VERSION
      version-source: npm
      version-source-npm-package: "@earendil-works/pi-coding-agent"
