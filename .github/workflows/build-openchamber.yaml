name: Build and push openchamber image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-openchamber.yaml
      - .github/workflows/update-openchamber.yaml
      - .github/workflows/build.yaml
      - images/openchamber/**
  schedule:
    - cron: 0 3 * * *  # Everyday at 3am
  workflow_dispatch:
    inputs:
      no-cache:
        description: No Cache
        type: boolean
        default: false

jobs:
  get-tags:
    name: Get tags
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tags: ${{ steps.get-tags.outputs.tags }}

    steps:
      - name: Checkout code
        id: checkout-code
        uses: actions/checkout@v6

      - name: Get tags
        id: get-tags
        run: |
          OPENCHAMBER_VERSION=$(
            grep "^ARG OPENCHAMBER_VERSION=" images/openchamber/Dockerfile | 
            cut -d '=' -f2
          )

          OPENCODE_VERSION=$(
            grep "^FROM arranhs/opencode:" images/openchamber/Dockerfile |
            cut -d ':' -f2
          )

          COMBINED_TAG="openchamber-$OPENCHAMBER_VERSION-opencode-$OPENCODE_VERSION"

          {
            echo "tags<<EOF"
            echo "latest"
            echo "$OPENCHAMBER_VERSION"
            echo "$COMBINED_TAG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  
          echo "
          Output:
          tags: latest, $OPENCHAMBER_VERSION, $COMBINED_TAG
          "

  build:
    name: Build image
    needs: get-tags
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    with:
      image-name: arranhs/openchamber
      context-path: images/openchamber
      image-tags: ${{ needs.get-tags.outputs.tags }}
