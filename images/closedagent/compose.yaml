services:
  closedagent:
    container_name: closedagent
    image: arranhs/closedagent:latest # Runs /bin/bash by default
    command: ["bash", "-c", "echo sleeping && sleep infinity"]
    volumes:
      - ./workspace:/home/agent/workspace # Workspace files
      - closedagent-apt:/var/cache/apt/archives # Persist apt package cache
      - closedagent-brew:/home/linuxbrew # Persist installed brew packages
      - closedagent-npm:/home/agent/.bun # Persist installed npm tools
      - closedagent-python:/home/agent/.cache/uv # Persist uv cache
    environment:
      - APT_PACKAGES="fastfetch micro"
      - BREW_PACKAGES="go gopls"
      - NPM_TOOLS="eslint prettier"
      - PYTHON_TOOLS="ruff mypy"

volumes:
  closedagent-apt:
  closedagent-brew:
  closedagent-npm:
  closedagent-python:
