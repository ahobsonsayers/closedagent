services:
  closedagent:
    container_name: closedagent
    image: arranhs/closedagent:latest # Runs /bin/bash by default
    command: ["bash", "-c", "echo sleeping && sleep infinity"]
    volumes:
      - ./workspace:/home/agent/workspace # Workspace files
      - closedagent-apt-cache:/var/cache/apt/archives # Persist apt cache
      - closedagent-brew-cache:/home/agent/.cache/Homebrew # Persist brew cache
      - closedagent-bun-cache:/home/agent/.bun/install/cache # Persist bun cache
      - closedagent-uv-cache:/home/agent/.cache/uv # Persist uv cache
    environment:
      - APT_PACKAGES="fastfetch micro"
      - BREW_PACKAGES="go gopls"
      - NPM_TOOLS="eslint prettier"
      - PYTHON_TOOLS="ruff mypy"

volumes:
  closedagent-apt-cache:
  closedagent-brew-cache:
  closedagent-bun-cache:
  closedagent-uv-cache:
