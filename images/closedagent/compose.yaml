services:
  closedagent:
    container_name: closedagent
    image: arranhs/closedagent:latest # Runs /bin/bash by default
    command: bash -c "echo sleeping && sleep infinity"
    volumes:
      - ./workspace:/home/agent/workspace # Workspace files
      - homebrew-cache:/home/agent/.cache/homebrew # Persist brew cache
      - npm-cache:/home/agent/.cache/npm # Persist npm cache
      - uv-cache:/home/agent/.cache/uv # Persist uv cache
      - apt-cache:/var/cache/apt/archives # Persist apt cache
    environment:
      - BREW_PACKAGES="go gopls"
      - NPM_TOOLS="eslint prettier"
      - PYTHON_TOOLS="ruff mypy"
      - APT_PACKAGES="fastfetch micro"

volumes:
  homebrew-cache:
  npm-cache:
  uv-cache:
  apt-cache:
